# Koyeb configuration file
version: "1"

services:
  - name: restaurant-backend
    type: web
    
    # Docker build
    build:
      builder: dockerfile
      dockerfile: Dockerfile
      context: .
    
    # Port exposed
    ports:
      - port: 8000
        protocol: http
    
    # Health check
    health_check:
      http:
        path: /health
        port: 8000
        initial_delay_seconds: 30
        interval_seconds: 10
        timeout_seconds: 5
        success_threshold: 1
        failure_threshold: 3
    
    # Scaling
    instances:
      min: 1
      max: 1
    
    # Environment variables (will be added via UI)
    env:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
      - key: RUST_LOG
        value: info
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:3001,https://b2b-saas-tau.vercel.app,https://dima-fomin.pl,https://www.dima-fomin.pl"
      - key: SQLX_OFFLINE
        value: "true"
      - key: JWT_ISSUER
        value: restaurant-backend
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: STRIPE_SUCCESS_URL
        value: "https://dima-fomin.pl/en/billing/success"
      - key: STRIPE_CANCEL_URL
        value: "https://dima-fomin.pl/en/billing/cancel"
      # ↓ SECRETS — вносить только через Koyeb UI, никогда не коммитить:
      # DATABASE_URL
      # JWT_SECRET
      # STRIPE_SECRET_KEY         (новый после ротации)
      # STRIPE_WEBHOOK_SECRET     (после создания webhook в Stripe Dashboard)
      # STRIPE_PRICE_ACTIONS_20
      # STRIPE_PRICE_ACTIONS_100
      # STRIPE_PRICE_ACTIONS_500
      # GEMINI_API_KEY            (новый после ротации)
      # CLOUDFLARE_R2_ACCESS_KEY_ID    (новый)
      # CLOUDFLARE_R2_SECRET_ACCESS_KEY (новый)
      # CLOUDFLARE_ACCOUNT_ID
      # CLOUDFLARE_R2_BUCKET_NAME
      # CLOUDFLARE_R2_PUBLIC_URL
      # ADMIN_EMAIL
      # ADMIN_JWT_SECRET
      # ADMIN_PASSWORD_HASH
